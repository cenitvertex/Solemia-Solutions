kind = "web"
previewPath = "/"
title = "Solemia Website"
version = "1.0.0"
id = "artifacts/solemia-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21966

[services.development]
run = "pnpm --filter @workspace/solemia-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solemia-web", "run", "build" ]
publicDir = "artifacts/solemia-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21966"
BASE_PATH = "/"
